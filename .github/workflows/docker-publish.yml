name: Docker Publish

on:
  push:
    branches: [main]
    tags: ['v*']
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

env:
  IMAGE_NAME: gerardsmit/pg_textsearch

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: docker/setup-qemu-action@v3
    - uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Generate date/sha
      id: vars
      run: |
        echo "date=$(date +%Y.%m.%d)" >> "$GITHUB_OUTPUT"
        echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

    - name: Compute image tags
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.IMAGE_NAME }}
        tags: |
          type=semver,pattern={{version}},prefix=pg18-
          type=semver,pattern={{major}}.{{minor}},prefix=pg18-
          type=semver,pattern={{major}},prefix=pg18-
          type=raw,value=pg18-${{ steps.vars.outputs.date }}-${{ steps.vars.outputs.sha }}
          type=raw,value=pg18-${{ steps.vars.outputs.date }}
          type=raw,value=pg18
          type=raw,value=latest

    - name: Get existing image digest
      id: existing
      run: |
        DIGEST=$(docker buildx imagetools inspect \
          ${{ env.IMAGE_NAME }}:latest \
          --format '{{json .Manifest.Digest}}' 2>/dev/null || echo "none")
        echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

    - name: Build image
      id: build
      uses: docker/build-push-action@v6
      with:
        context: .
        load: true
        platforms: linux/amd64
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Push if changed (or tag push / manual)
      if: steps.build.outputs.digest != steps.existing.outputs.digest || github.event_name != 'schedule'
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        platforms: linux/amd64,linux/arm64
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
