name: pgspot Security Check

# NOTE: PR checks are consolidated in ci.yml. This workflow runs on main only.
on:
  push:
    branches: [ main ]
    paths:
      - 'sql/**'
      - '.github/workflows/pgspot.yml'

jobs:
  pgspot:
    name: Check Extension SQL
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install pgspot
      run: pip install pgspot

    - name: Run pgspot
      run: |
        # Check the current version's base install SQL file
        VERSION=$(awk -F"'" '/default_version/ {print $2}' pg_textsearch.control)
        echo "Checking sql/pg_textsearch--${VERSION}.sql"
        pgspot \
          --proc-without-search-path "extschema.bm25_prefix(prefix_text text)" \
          --proc-without-search-path "extschema.bm25_prefix(prefix_text text,index_name text)" \
          --proc-without-search-path "extschema.bm25_phrase(tokens text[])" \
          --proc-without-search-path "extschema.bm25_phrase(tokens text[],index_name text)" \
          --proc-without-search-path "extschema.bm25_phrase_prefix(tokens text[])" \
          --proc-without-search-path "extschema.bm25_phrase_prefix(tokens text[],index_name text)" \
          "sql/pg_textsearch--${VERSION}.sql"
